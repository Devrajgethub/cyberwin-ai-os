<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000808"/>
      <stop offset="100%" style="stop-color:#001a0a"/>
    </linearGradient>
    <radialGradient id="c1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:0"/>
    </radialGradient>
    <pattern id="circuit" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M0 50 H40 V30 H60 V50 H100" stroke="#00ff41" stroke-opacity="0.08" fill="none" stroke-width="1"/>
      <path d="M50 0 V40 H30 V60 H50 V100" stroke="#00ff41" stroke-opacity="0.06" fill="none" stroke-width="1"/>
      <circle cx="50" cy="50" r="3" fill="#00ff41" fill-opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#c1)"/>
